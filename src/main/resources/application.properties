# ============================================================
#  Configuration via VARIABLES D'ENVIRONNEMENT (aucun secret ici)
#  En local : definis ces variables, ou cree un fichier
#  application-local.properties (non versionne) pour le dev.
# ============================================================

# --- Base de donnees (Supabase, session pooler IPv4) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- Envoi d'e-mails (Gmail SMTP) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Parametres de l'application ---
app.admin-email=${ADMIN_EMAIL}
app.site-name=Établissements Scolaires
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# Origines autorisees (CORS) : en prod, on y mettra l'URL Vercel
app.cors-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# Port : Render fournit la variable PORT ; en local on retombe sur 8080
server.port=${PORT:8080}