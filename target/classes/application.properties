# ============================================================
#  CONNEXION A SUPABASE (PostgreSQL)
#  >>> REMPLACE les 3 valeurs entre crochets par les tiennes <<<
#  (voir le README.md, section "Brancher Supabase")
# ============================================================

spring.datasource.url=jdbc:postgresql://[HOTE_SUPABASE]:5432/postgres
spring.datasource.username=[UTILISATEUR_SUPABASE]
spring.datasource.password=[MOT_DE_PASSE_SUPABASE]
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================================
#  JPA / HIBERNATE
# ============================================================

# "update" cree/met a jour automatiquement les tables a partir des entites
spring.jpa.hibernate.ddl-auto=update

# Affiche le SQL genere dans la console (pratique pour apprendre)
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================================
#  SERVEUR
# ============================================================
server.port=8080
